name: ci

on:
  push:
    branches: [main]
  pull_request:

# Non-waterline TS repo — earns the org's TypeScript class gate by calling the
# central reusable (one source of truth in vista-forge/.github; per-repo YAML
# cannot drift). Node version comes from .node-version (24 — the VSCode
# extension-host / node:sqlite floor, P0 of vista-atlas-and-compass-de-novo).
jobs:
  ci:
    uses: vista-forge/.github/.github/workflows/ts-ci.yml@main
    with:
      coverage-floor: 90
