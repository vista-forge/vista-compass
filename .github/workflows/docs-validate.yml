# Docs corpus validation gate — calls the org reusable workflow (the .github repo).
name: docs-validate
on:
  push:
    paths: ["**/*.md", ".github/workflows/docs-validate.yml"]
  pull_request:
    paths: ["**/*.md"]
jobs:
  validate:
    uses: vista-forge/.github/.github/workflows/validate.yml@main
    with:
      layout_path: "docs"
